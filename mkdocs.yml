# Informació del site
site_name: Documentació MVM
site_description: Documentació pels CCFF de l'Institut Manuel Vázquez Montalbán
site_url: https://...

# Repositori
repo_url: https://github.com/mvm-classroom/docs
repo_name: docs

# Configuració del tema
theme:
  name: material
  language: ca
  logo: assets/img/logo.png  # Opcional
  favicon: assets/img/favicon.ico  # Opcional
  
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb-outline
        name: Mode clar
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb
        name: Mode fosc
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

# Plugins
plugins:
  - search
  - mermaid2:
      version: "10.9.0"
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

# Extensiones de Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# CSS personalitzat
extra_css:
  - css/extra.css

# Navegació principal
nav:
  - Inici: index.md
  - Cicles formatius:
    - General:
      - Guia Markdown: cicles/general/guia-markdown.md
    - SMX: cicles/smx/index.md
    - ASIX:
      - Guia bàsica GNS3: cicles/asix/howto-gns3.md
    - DAW: cicles/daw/index.md

extra:
  search:
    placeholder: Cercar
